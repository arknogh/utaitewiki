<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utaite Wiki Fandom Utilities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .gradient-text {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(45deg, #6d28d9, #7c3aed, #8b5cf6);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-blue-50 min-h-screen font-sans text-gray-800">
    <div class="noise-overlay absolute inset-0 opacity-5 z-0" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22a%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%22.65%22 numOctaves=%222%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23a)%22/%3E%3C/svg%3E');"></div>
    
    <nav class="sticky top-0 z-50 glass-effect border-b border-purple-100 shadow-sm">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
                <span class="font-semibold text-lg">Utaite Wiki Tools</span>
            </div>
            <div class="flex items-center space-x-4">
                <a href="#" class="text-gray-600 hover:text-primary-700 transition-colors hidden md:inline-block">
                    <i class="fas fa-home mr-1"></i> Home
                </a>
                <a href="https://utaite.fandom.com" target="_blank" class="text-gray-600 hover:text-primary-700 transition-colors hidden md:inline-block">
                    <i class="fas fa-external-link-alt mr-1"></i> Wiki
                </a>
                <a href="https://arknogh.github.io/utaitewiki/contact/" class="px-4 py-1 bg-primary-600 text-white rounded-full hover:bg-primary-700 transition-colors text-sm">
                    <i class="fas fa-comment-dots mr-1"></i> Contact
                </a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-12 relative z-10">
        <!-- Header -->
        <header class="text-center mb-16">
            <h1 id="main-title" class="text-4xl md:text-5xl font-bold mb-4 gradient-text">Loading...</h1>
            <p id="main-description" class="text-lg md:text-xl text-gray-600 max-w-3xl mx-auto">Loading...</p>
            
            <div class="mt-8 inline-flex flex-wrap justify-center gap-3">
                <a href="#tools" class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors shadow-md">
                    <i class="fas fa-tools mr-2"></i> Browse Tools
                </a>
                <a href="https://arknogh.github.io/utaitewiki/contact/" class="px-6 py-2 bg-white text-primary-700 border border-primary-300 rounded-lg hover:bg-primary-50 transition-colors shadow-sm">
                    <i class="fas fa-question-circle mr-2"></i> Get Help
                </a>
            </div>
        </header>

        <!-- Search -->
        <div class="max-w-2xl mx-auto mb-16">
            <div class="relative">
                <input type="text" id="search-tools" placeholder="Search for a tool..." class="w-full px-5 py-3 rounded-full border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition duration-200 outline-none shadow-sm">
                <div class="absolute right-3 top-2.5 text-gray-400">
                    <i class="fas fa-search text-lg"></i>
                </div>
            </div>
        </div>

        <!-- Tools Grid -->
        <div id="tools-section">
            <h2 id="tools" class="text-2xl font-semibold mb-8 text-center">
                <span class="inline-block bg-primary-100 text-primary-800 px-4 py-1 rounded-full">Available Utilities</span>
            </h2>
            <div id="tools-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
                <!-- Cards will be dynamically inserted here -->
                <div class="bg-white/30 rounded-xl animate-pulse h-72"></div>
                <div class="bg-white/30 rounded-xl animate-pulse h-72 animation-delay-200"></div>
                <div class="bg-white/30 rounded-xl animate-pulse h-72 animation-delay-300"></div>
            </div>
        </div>

        <!-- Newsletter / Updates Section -->
        <div class="mt-24 bg-white rounded-xl shadow-lg p-8 max-w-4xl mx-auto border border-purple-100">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="md:w-1/3 text-center">
                    <i class="fas fa-bell text-6xl text-primary-500 mb-4"></i>
                </div>
                <!-- <div class="md:w-2/3">
                    <h3 class="text-2xl font-semibold mb-3">Stay Updated</h3>
                    <p class="text-gray-600 mb-4">Get notified when new tools are added or existing ones are improved. We're constantly working to make Utaite Wiki management easier.</p>
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input type="email" placeholder="Your email address" class="flex-grow px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition duration-200 outline-none">
                        <button class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors flex-shrink-0">
                            Subscribe
                        </button>
                    </div>-->
                </div> 
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-24 text-center text-gray-600 border-t border-purple-100 pt-8">
            <div class="flex justify-center space-x-6 mb-6">
                <a href="#" class="text-gray-500 hover:text-primary-600 transition-colors">
                    <i class="fab fa-github text-2xl"></i>
                </a>
                <a href="#" class="text-gray-500 hover:text-primary-600 transition-colors">
                    <i class="fab fa-twitter text-2xl"></i>
                </a>
                <a href="#" class="text-gray-500 hover:text-primary-600 transition-colors">
                    <i class="fab fa-discord text-2xl"></i>
                </a>
            </div>
            <p class="mb-2">More utilities will be added soon to help manage and improve the Utaite Wiki Fandom.</p>
            <p class="text-sm">© 2025 Utaite Wiki Fandom Utilities. This is an unofficial fan project.</p>
        </footer>
    </div>

    <script>
        function createFeatureCard(feature) {
            const statusBadge = feature.status === 'pending' 
                ? `<span class="absolute top-4 right-4 px-3 py-1 bg-yellow-100 text-yellow-800 text-xs font-medium rounded-full">Coming Soon</span>`
                : '';
                
            const newBadge = feature.isNew 
                ? `<span class="absolute top-4 right-4 px-3 py-1 bg-green-100 text-green-800 text-xs font-medium rounded-full">New</span>`
                : '';
                
            if (feature.status === 'pending') {
                return `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden opacity-75 border border-gray-200 relative card-hover">
                        ${statusBadge}
                        <div class="${feature.backgroundColor || 'bg-gray-500'} p-5">
                            <div class="flex items-center">
                                <i class="${feature.icon || 'fas fa-tools'} text-white text-2xl mr-3"></i>
                                <h2 class="text-xl font-semibold text-white">${feature.title}</h2>
                            </div>
                        </div>
                        <div class="p-6">
                            <div class="animate-pulse-slow">
                                <div class="h-4 bg-gray-200 rounded w-3/4 mb-4"></div>
                                <div class="h-4 bg-gray-200 rounded w-1/2 mb-4"></div>
                                <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                            </div>
                            <div class="mt-6">
                                <button disabled class="inline-block bg-gray-400 text-white px-6 py-2 rounded-lg cursor-not-allowed">
                                    Coming Soon
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            const bulletPoints = feature.bullets.map(bullet => `
                <div class="flex items-start text-gray-700 mb-2">
                    <i class="fas fa-check-circle text-primary-500 mt-1 mr-2"></i>
                    <span>${bullet}</span>
                </div>
            `).join('');

            return `
                <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 relative card-hover">
                    ${newBadge}
                    <div class="${feature.backgroundColor || 'bg-primary-600'} p-5">
                        <div class="flex items-center">
                            <i class="${feature.icon || 'fas fa-tools'} text-white text-2xl mr-3"></i>
                            <h2 class="text-xl font-semibold text-white">${feature.title}</h2>
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-gray-800 font-medium mb-3">${feature.shortTitle}</h3>
                        <p class="text-gray-600 mb-4">
                            ${feature.description}
                        </p>
                        <div class="space-y-1 mb-6">
                            ${bulletPoints}
                        </div>
                        <div class="mt-auto">
                            <a href="${feature.url}" class="inline-flex items-center bg-primary-600 text-white px-6 py-2 rounded-lg hover:bg-primary-700 transition duration-300 shadow-sm">
                                <i class="fas fa-external-link-alt mr-2"></i> Access Tool
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadFeatures() {
            try {
                const response = await fetch('./features.json');
                const data = await response.json();
                
                // Update header
                document.getElementById('main-title').textContent = data.title;
                document.getElementById('main-description').textContent = data.description;
                
                // Update cards
                const toolsGrid = document.getElementById('tools-grid');
                toolsGrid.innerHTML = data.features.map(feature => createFeatureCard(feature)).join('');
                
                // Setup search functionality
                const searchInput = document.getElementById('search-tools');
                searchInput.addEventListener('input', function(e) {
                    const searchTerm = e.target.value.toLowerCase();
                    const filteredFeatures = data.features.filter(feature => 
                        feature.title.toLowerCase().includes(searchTerm) || 
                        feature.description.toLowerCase().includes(searchTerm) ||
                        feature.shortTitle.toLowerCase().includes(searchTerm) ||
                        feature.bullets.some(bullet => bullet.toLowerCase().includes(searchTerm))
                    );
                    
                    toolsGrid.innerHTML = filteredFeatures.length > 0 
                        ? filteredFeatures.map(feature => createFeatureCard(feature)).join('')
                        : `<div class="col-span-3 text-center py-12">
                            <i class="fas fa-search text-4xl text-gray-300 mb-4"></i>
                            <p class="text-gray-500">No tools match your search criteria.</p>
                          </div>`;
                });
                
            } catch (error) {
                console.error('Error loading features:', error);
                document.getElementById('tools-grid').innerHTML = `
                    <div class="col-span-3 text-center py-12">
                        <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i>
                        <p class="text-red-600 font-medium">Error loading features.</p>
                        <p class="text-gray-500 mt-2">Please try refreshing the page.</p>
                        <button onclick="loadFeatures()" class="mt-4 px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors">
                            Try Again
                        </button>
                    </div>
                `;
            }
        }

        // Load features when the page loads
        document.addEventListener('DOMContentLoaded', loadFeatures);
    </script>
</body>
</html>
