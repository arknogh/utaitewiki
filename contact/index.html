<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/validator/13.7.0/validator.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Contact Us</h1>
        
        <form action="https://formsubmit.co/arknogh@gmail.com" method="POST" id="contactForm" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                <input type="text" id="name" name="name" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p id="nameError" class="text-red-500 text-xs mt-1 hidden">Please enter your name</p>
            </div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p id="emailError" class="text-red-500 text-xs mt-1 hidden">Please enter a valid email address</p>
            </div>
            
            <div>
                <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                <input type="text" id="subject" name="subject" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p id="subjectError" class="text-red-500 text-xs mt-1 hidden">Please enter a subject</p>
            </div>
            
            <div>
                <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                <textarea id="message" name="message" rows="4" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <p id="messageError" class="text-red-500 text-xs mt-1 hidden">Please enter your message</p>
            </div>
            
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition duration-300">
                Send Message
            </button>
        </form>
        
        <!-- Success and error messages -->
        <div id="successMessage" class="hidden mt-4 p-3 bg-green-100 text-green-700 rounded-md">
            Your message has been sent successfully! We'll get back to you soon.
        </div>
        
        <div id="errorMessage" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-md">
            There was an error sending your message. Please try again later.
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const contactForm = document.getElementById('contactForm');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            
            contactForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // Reset error messages
                document.querySelectorAll('.text-red-500').forEach(el => el.classList.add('hidden'));
                successMessage.classList.add('hidden');
                errorMessage.classList.add('hidden');
                
                // Get form data
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const subject = document.getElementById('subject').value.trim();
                const message = document.getElementById('message').value.trim();
                
                // Validate form data
                let isValid = true;
                
                if (!name) {
                    document.getElementById('nameError').classList.remove('hidden');
                    isValid = false;
                }
                
                if (!email || !validator.isEmail(email)) {
                    document.getElementById('emailError').classList.remove('hidden');
                    isValid = false;
                }
                
                if (!subject) {
                    document.getElementById('subjectError').classList.remove('hidden');
                    isValid = false;
                }
                
                if (!message) {
                    document.getElementById('messageError').classList.remove('hidden');
                    isValid = false;
                }
                
                if (!isValid) return;
                
                // Form is valid, prepare data for sending
                const formData = {
                    name,
                    email,
                    subject,
                    message,
                    to: "arknomeeru@gmail.com"
                };
                
                // This would be where you'd send the data to a server
                // Since we're deploying to GitHub Pages (static hosting), we'll use formsubmit.co as an example service
                const actionUrl = `https://formsubmit.co/${formData.to}`;
                
                // Create and submit a hidden form
                const hiddenForm = document.createElement('form');
                hiddenForm.method = 'POST';
                hiddenForm.action = actionUrl;
                
                // Add form fields
                for (const key in formData) {
                    if (key === 'to') continue; // Skip the 'to' field as it's already in the URL
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = formData[key];
                    hiddenForm.appendChild(input);
                }
                
                // Add success URL (redirect back to same page)
                const successUrl = document.createElement('input');
                successUrl.type = 'hidden';
                successUrl.name = '_next';
                successUrl.value = window.location.href;
                hiddenForm.appendChild(successUrl);
                
                // Prevent captcha
                const captcha = document.createElement('input');
                captcha.type = 'hidden';
                captcha.name = '_captcha';
                captcha.value = 'false';
                hiddenForm.appendChild(captcha);
                
                // Append to body and submit
                document.body.appendChild(hiddenForm);
                
                // This would normally submit the form, but for demo purposes let's simulate success
                // hiddenForm.submit();
                document.body.removeChild(hiddenForm);
                
                // Show success message
                contactForm.reset();
                successMessage.classList.remove('hidden');
                
                // For demo purposes, uncomment the actual form submission and comment out these lines:
                console.log('Form submitted with data:', formData);
            });
        });
    </script>
</body>
</html>
