<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl p-8 max-w-md w-full border border-gray-100">
        <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">Contact Us</h1>
        <p class="text-gray-500 text-center mb-6">We'd love to hear from you!</p>
        
        <form id="contactForm" action="https://formsubmit.co/arknomeeru@gmail.com" method="POST" class="space-y-6">
            <!-- FormSubmit Configuration -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="https://arknogh.github.io/contact/thanks">
            <input type="hidden" name="_subject" value="New Contact Form Submission">
            
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                <input type="text" id="name" name="name" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                <p id="nameError" class="text-red-500 text-xs mt-1 hidden">Please enter your name</p>
            </div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                <p id="emailError" class="text-red-500 text-xs mt-1 hidden">Please enter a valid email address</p>
            </div>
            
            <div>
                <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                <input type="text" id="subject" name="subject" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                <p id="subjectError" class="text-red-500 text-xs mt-1 hidden">Please enter a subject</p>
            </div>
            
            <div>
                <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                <textarea id="message" name="message" rows="4" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"></textarea>
                <p id="messageError" class="text-red-500 text-xs mt-1 hidden">Please enter your message</p>
            </div>
            
            <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-medium py-3 px-4 rounded-lg transition duration-300 transform hover:scale-[1.02] shadow-md">
                Send Message
            </button>
        </form>
        
        <p class="mt-6 text-center text-xs text-gray-500">Your information is securely processed via FormSubmit</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const contactForm = document.getElementById('contactForm');
            
            contactForm.addEventListener('submit', function(e) {
                // Reset error messages
                document.querySelectorAll('.text-red-500').forEach(el => el.classList.add('hidden'));
                
                // Get form data
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const subject = document.getElementById('subject').value.trim();
                const message = document.getElementById('message').value.trim();
                
                // Validate form data
                let isValid = true;
                
                if (!name) {
                    document.getElementById('nameError').classList.remove('hidden');
                    isValid = false;
                }
                
                if (!email) {
                    document.getElementById('emailError').classList.remove('hidden');
                    isValid = false;
                } else if (!isValidEmail(email)) {
                    document.getElementById('emailError').classList.remove('hidden');
                    isValid = false;
                }
                
                if (!subject) {
                    document.getElementById('subjectError').classList.remove('hidden');
                    isValid = false;
                }
                
                if (!message) {
                    document.getElementById('messageError').classList.remove('hidden');
                    isValid = false;
                }
                
                // Stop form submission if validation fails
                if (!isValid) {
                    e.preventDefault();
                }
            });
            
            // Simple email validation function
            function isValidEmail(email) {
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailPattern.test(email);
            }
        });
    </script>
</body>
</html>
