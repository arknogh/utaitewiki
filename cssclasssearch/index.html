<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utaite Wiki CSS Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        .loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .highlight {
            background-color: #FFFF00;
            color: #000000;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-8 text-indigo-600">Utaite Wiki CSS Database</h1>
        
        <div class="mb-6 bg-white p-4 rounded-lg shadow">
            <div class="mb-4">
                <label for="search" class="block text-gray-700 font-medium mb-2">Search:</label>
                <input type="text" id="search" placeholder="Type to search..." 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
            </div>
            
            <div class="flex flex-wrap gap-2 mb-4">
                <button id="fetch-css" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
                    Fetch CSS Files
                </button>
                <button id="reset" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition">
                    Reset
                </button>
                <div class="ml-auto flex items-center">
                    <span id="status" class="text-gray-600 italic">Ready</span>
                    <div id="loading-spinner" class="ml-2 w-5 h-5 border-2 border-indigo-600 border-t-transparent rounded-full loading hidden"></div>
                </div>
            </div>
            
            <div class="flex gap-4 mb-2">
                <div class="flex items-center">
                    <input type="checkbox" id="show-classes-only" class="mr-2">
                    <label for="show-classes-only" class="text-gray-700">Show only class definitions</label>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="case-sensitive" class="mr-2">
                    <label for="case-sensitive" class="text-gray-700">Case sensitive search</label>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <!-- CSS Files List (1/4 width on large screens) -->
            <div class="bg-white p-4 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-2 text-indigo-600">CSS Files</h2>
                <div id="css-files-count" class="text-sm text-gray-600 mb-2">0 files found</div>
                <div id="css-files-list" class="max-h-128 overflow-y-auto">
                    <p class="text-gray-500 italic">No files loaded yet</p>
                </div>
            </div>
            
            <!-- CSS Content Display (3/4 width on large screens) -->
            <div class="lg:col-span-3 bg-white p-4 rounded-lg shadow">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-indigo-600">CSS Content</h2>
                    <div id="current-file" class="text-gray-600 font-medium"></div>
                </div>
                <div id="search-stats" class="mb-2 text-sm text-gray-600 hidden">
                    Found <span id="match-count">0</span> matches
                    <button id="prev-match" class="ml-2 px-2 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50" disabled>Previous</button>
                    <button id="next-match" class="ml-1 px-2 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50" disabled>Next</button>
                    <span id="match-position" class="ml-2"></span>
                </div>
                <div id="css-content" class="border border-gray-200 p-4 rounded-lg bg-gray-50 min-h-64 max-h-128 overflow-y-auto font-mono text-sm">
                    <p class="text-gray-500 italic">Select a CSS file to view its content</p>
                </div>
            </div>
        </div>
        
        <!-- Hard-coded CSS content area -->
        <div id="css-database" class="mt-6">
            <!-- This will be populated with the hard-coded CSS data -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // State variables
            let cssFiles = [];
            let currentFileIndex = -1;
            let currentMatches = [];
            let currentMatchIndex = -1;
            
            // DOM elements
            const fetchButton = document.getElementById('fetch-css');
            const resetButton = document.getElementById('reset');
            const searchInput = document.getElementById('search');
            const cssFilesList = document.getElementById('css-files-list');
            const cssContent = document.getElementById('css-content');
            const currentFile = document.getElementById('current-file');
            const loadingSpinner = document.getElementById('loading-spinner');
            const statusText = document.getElementById('status');
            const cssFilesCount = document.getElementById('css-files-count');
            const showClassesOnly = document.getElementById('show-classes-only');
            const caseSensitive = document.getElementById('case-sensitive');
            const cssDatabase = document.getElementById('css-database');
            
            // Search navigation elements
            const searchStats = document.getElementById('search-stats');
            const matchCount = document.getElementById('match-count');
            const prevMatchBtn = document.getElementById('prev-match');
            const nextMatchBtn = document.getElementById('next-match');
            const matchPosition = document.getElementById('match-position');

            };
            
            // Additional CSS files with more class definitions
            const additionalCSSContent = {
                "MediaWiki:Gadget-SongArticleNotes.css": `/* CSS for Song Article Notes gadget */

                "MediaWiki:Gadget-UtaiteBox.css": `/* CSS for Utaite Info Box */

`,
                "MediaWiki:Gadget-Timeline.css": `/* CSS for Timeline gadget */

            };
            
            // Merge both CSS content collections
            Object.assign(predefinedCSSContent, additionalCSSContent);
            
            // Button event listeners
            fetchButton.addEventListener('click', fetchCSSFiles);
            resetButton.addEventListener('click', resetApp);
            searchInput.addEventListener('input', searchInCurrentFile);
            showClassesOnly.addEventListener('change', () => { 
                if (currentFileIndex >= 0) displayFileContent(currentFileIndex);
            });
            caseSensitive.addEventListener('change', () => {
                if (currentFileIndex >= 0 && searchInput.value) searchInCurrentFile();
            });
            prevMatchBtn.addEventListener('click', () => navigateMatches(-1));
            nextMatchBtn.addEventListener('click', () => navigateMatches(1));
            
            // Functions
            async function fetchCSSFiles() {
                setLoading(true, 'Fetching CSS files list...');
                cssFiles = [];
                cssFilesList.innerHTML = '';
                
                try {
                    // We'll use our predefined CSS files since direct API calls will be blocked by CORS
                    const cssPages = Object.keys(predefinedCSSContent).map(title => ({
                        title: title,
                        content: predefinedCSSContent[title]
                    }));
                    
                    if (cssPages.length === 0) {
                        cssFilesList.innerHTML = '<p class="text-red-500">No CSS files found</p>';
                        cssFilesCount.textContent = '0 files found';
                        setLoading(false, 'No CSS files found');
                        return;
                    }
                    
                    // Store CSS files data
                    cssPages.forEach(page => {
                        const pageTitle = page.title;
                        const pageUrl = `https://utaite.fandom.com/wiki/${encodeURIComponent(pageTitle)}`;
                        
                        cssFiles.push({
                            title: pageTitle,
                            url: pageUrl,
                            content: page.content
                        });
                    });
                    
                    // Display the CSS files list
                    renderFilesList();
                    cssFilesCount.textContent = `${cssFiles.length} files found`;
                    setLoading(false, `Found ${cssFiles.length} CSS files`);
                    
                    // Extract all class names for the database
                    extractAndDisplayClasses();
                    
                } catch (error) {
                    console.error('Error loading CSS files:', error);
                    cssFilesList.innerHTML = `<p class="text-red-500">Error loading CSS files: ${error.message}</p>`;
                    setLoading(false, 'Error loading CSS files');
                }
            }
            
            function renderFilesList() {
                const fragment = document.createDocumentFragment();
                
                cssFiles.forEach((file, index) => {
                    const fileItem = document.createElement('div');
                    fileItem.className = 'py-1 border-b border-gray-100 hover:bg-gray-50 cursor-pointer';
                    
                    // Extract filename from the full title (MediaWiki:Something.css)
                    const fileName = file.title.split(':').pop();
                    
                    fileItem.innerHTML = `
                        <div class="flex items-center">
                            <span class="flex-grow">${fileName}</span>
                            <a href="${file.url}" target="_blank" class="text-blue-500 hover:text-blue-700 ml-2" title="View on Wiki">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                </svg>
                            </a>
                        </div>
                    `;
                    
                    fileItem.addEventListener('click', (e) => {
                        // Don't trigger if they clicked the external link
                        if (e.target.tagName === 'A' || e.target.tagName === 'SVG' || e.target.tagName === 'PATH') {
                            return;
                        }
                        loadFileContent(index);
                    });
                    
                    fragment.appendChild(fileItem);
                });
                
                cssFilesList.innerHTML = '';
                cssFilesList.appendChild(fragment);
            }
            
            function loadFileContent(index) {
                if (index < 0 || index >= cssFiles.length) return;
                
                const fileToLoad = cssFiles[index];
                currentFileIndex = index;
                
                // Highlight selected file
                const fileItems = cssFilesList.querySelectorAll('div.hover\\:bg-gray-50');
                fileItems.forEach((item, i) => {
                    if (i === index) {
                        item.classList.add('bg-indigo-100');
                    } else {
                        item.classList.remove('bg-indigo-100');
                    }
                });
                
                // Show filename
                currentFile.textContent = fileToLoad.title;
                
                // Display content
                displayFileContent(index);
                setLoading(false, `Loaded ${fileToLoad.title}`);
            }
            
            function displayFileContent(index) {
                if (index < 0 || index >= cssFiles.length) return;
                
                const fileToDisplay = cssFiles[index];
                let contentToDisplay = fileToDisplay.content;
                
                // Filter to only show class definitions if option is selected
                if (showClassesOnly.checked) {
                    const classLines = [];
                    const lines = contentToDisplay.split('\n');
                    
                    let inClassDefinition = false;
                    let bracketCount = 0;
                    
                    for (const line of lines) {
                        // Check if this line contains a class selector
                        if (line.includes('.') && line.includes('{')) {
                            inClassDefinition = true;
                            bracketCount = countChar(line, '{') - countChar(line, '}');
                            classLines.push(line);
                        } 
                        // Continue collecting lines while inside a class definition
                        else if (inClassDefinition) {
                            classLines.push(line);
                            bracketCount += countChar(line, '{') - countChar(line, '}');
                            
                            // End of definition when brackets are balanced
                            if (bracketCount <= 0) {
                                inClassDefinition = false;
                            }
                        }
                    }
                    
                    contentToDisplay = classLines.join('\n');
                }
                
                // Apply syntax highlighting (simple version)
                contentToDisplay = highlightCSSSyntax(contentToDisplay);
                
                cssContent.innerHTML = `<pre>${contentToDisplay}</pre>`;
                
                // Apply search if there's a term
                if (searchInput.value) {
                    searchInCurrentFile();
                } else {
                    searchStats.classList.add('hidden');
                }
            }
            
            function extractAndDisplayClasses() {
                const allClasses = new Map(); // Map to store unique classes and their references
                
                // Extract classes from all CSS files
                cssFiles.forEach(file => {
                    const content = file.content;
                    
                    // Extract class selectors using regex
                    const selectorRegex = /([.][a-zA-Z0-9_-]+)[^{]*{/g;
                    let match;
                    
                    while ((match = selectorRegex.exec(content)) !== null) {
                        const fullSelector = match[0].substring(0, match[0].length - 1).trim();
                        const className = match[1].substring(1); // Remove the leading dot
                        
                        if (className) {
                            if (!allClasses.has(className)) {
                                allClasses.set(className, []);
                            }
                            
                            allClasses.get(className).push({
                                selector: fullSelector,
                                file: file.title
                            });
                        }
                    }
                });
                
                // Convert to array and sort alphabetically
                const sortedClasses = Array.from(allClasses.entries())
                    .sort((a, b) => a[0].localeCompare(b[0]));
                
                // Create the database HTML
                let html = `
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h2 class="text-xl font-semibold mb-4 text-indigo-600">Class Database</h2>
                        <div class="text-sm text-gray-600 mb-4">Found ${sortedClasses.length} unique classes across ${cssFiles.length} files</div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                `;
                
                // Add each class with its references
                sortedClasses.forEach(([className, occurrences]) => {
                    html += `
                        <div class="border border-gray-200 rounded-lg p-3 hover:bg-gray-50">
                            <div class="font-mono text-indigo-600 font-semibold mb-2">.${className}</div>
                            <div class="text-xs text-gray-500 mb-1">Found in ${occurrences.length} place(s):</div>
                            <ul class="text-xs text-gray-600">
                    `;
                    
                    // Limit to first 3 occurrences to keep it clean
                    const displayOccurrences = occurrences.slice(0, 3);
                    displayOccurrences.forEach(occurrence => {
                        const fileName = occurrence.file.split(':').pop();
                        html += `<li>• ${fileName}: <span class="font-mono">${occurrence.selector}</span></li>`;
                    });
                    
                    // Show message if there are more occurrences
                    if (occurrences.length > 3) {
                        html += `<li class="text-gray-500 italic">+ ${occurrences.length - 3} more...</li>`;
                    }
                    
                    html += `
                            </ul>
                        </div>
                    `;
                });
                
                html += `
                        </div>
                    </div>
                `;
                
                cssDatabase.innerHTML = html;
            }
            
            function highlightCSSSyntax(css) {
                // This is a simple syntax highlighter
                // For a production app, consider using a dedicated library
                
                // Escape HTML to prevent script injection
                let highlighted = escapeHtml(css);
                
                // Add some basic syntax highlighting
                highlighted = highlighted
                    // Properties
                    .replace(/([a-zA-Z-]+)(\s*):(\s*[^;]+;)/g, '<span style="color:#905">$1</span>$2:$3')
                    // Selectors
                    .replace(/([.#][a-zA-Z0-9_-]+)/g, '<span style="color:#007">$1</span>')
                    // Values
                    .replace(/:(\s*)([^;]+)(;)/g, ':$1<span style="color:#077">$2</span>$3')
                    // Comments
                    .replace(/(\/\*[\s\S]*?\*\/)/g, '<span style="color:#999">$1</span>');
                
                return highlighted;
            }
            
            function escapeHtml(unsafe) {
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }
            
            function countChar(str, char) {
                return (str.match(new RegExp(char, 'g')) || []).length;
            }
            
            function searchInCurrentFile() {
                if (currentFileIndex < 0 || !cssFiles[currentFileIndex].content) return;
                
                const searchTerm = searchInput.value;
                if (!searchTerm) {
                    // If search is cleared, redisplay without highlights
                    displayFileContent(currentFileIndex);
                    searchStats.classList.add('hidden');
                    currentMatches = [];
                    currentMatchIndex = -1;
                    return;
                }
                
                const content = cssFiles[currentFileIndex].content;
                const isCaseSensitive = caseSensitive.checked;
                
                // Find all matches
                currentMatches = [];
                let searchRegex;
                
                try {
                    // Create a regex that will find all matches
                    searchRegex = new RegExp(escapeRegExp(searchTerm), isCaseSensitive ? 'g' : 'gi');
                    let match;
                    
                    while ((match = searchRegex.exec(content)) !== null) {
                        currentMatches.push({
                            index: match.index,
                            length: match[0].length
                        });
                    }
                } catch (e) {
                    console.error('Invalid regex:', e);
                }
                
                // Update the display with highlighted matches
                if (currentMatches.length > 0) {
                    // Get the content with syntax highlighting
                    let displayContent = highlightCSSSyntax(content);
                    
                    // Now add highlights for search matches
                    // We need to do this carefully to not interfere with syntax highlighting
                    let offset = 0;
                    for (let i = 0; i < currentMatches.length; i++) {
                        const match = currentMatches[i];
                        
                        // Find the actual position in the highlighted text
                        // This is complex because the syntax highlighting has added HTML tags
                        const beforeMatch = displayContent.substring(0, match.index + offset);
                        const matchText = displayContent.substring(match.index + offset, match.index + match.length + offset);
                        
                        // Count how many HTML tags are in the text before this match
                        const tagRegex = /<[^>]+>/g;
                        let tagMatch;
                        let tagLength = 0;
                        
                        while ((tagMatch = tagRegex.exec(beforeMatch)) !== null) {
                            tagLength += tagMatch[0].length;
                        }
                        
                        // Adjust the offset for this match
                        offset += tagLength;
                        
                        // Update the match position
                        match.highlightIndex = match.index + offset;
                        
                        // Add the highlight
                        const before = displayContent.substring(0, match.highlightIndex);
                        const after = displayContent.substring(match.highlightIndex + match.length);
                        displayContent = before + `<span id="match-${i}" class="highlight">${matchText}</span>` + after;
                        
                        // Adjust offset for the highlight tags we just added
                        offset += '<span id="match-" class="highlight"></span>'.length + i.toString().length;
                    }
                    
                    cssContent.innerHTML = `<pre>${displayContent}</pre>`;
                    
                    // Show search stats
                    searchStats.classList.remove('hidden');
                    matchCount.textContent = currentMatches.length;
                    
                    // Enable/disable navigation buttons
                    updateMatchNavigation(0);
                } else {
                    // Just show the content without highlights
                    displayFileContent(currentFileIndex);
                    
                    // Show "no matches" message
                    searchStats.classList.remove('hidden');
                    matchCount.textContent = 0;
                    matchPosition.textContent = '';
                    prevMatchBtn.disabled = true;
                    nextMatchBtn.disabled = true;
                }
            }
            
            function navigateMatches(direction) {
                if (currentMatches.length === 0) return;
                
                const newIndex = currentMatchIndex + direction;
                if (newIndex >= 0 && newIndex < currentMatches.length) {
                    updateMatchNavigation(newIndex);
                }
            }
            
            function updateMatchNavigation(index) {
                currentMatchIndex = index;
                
                // Update buttons state
                prevMatchBtn.disabled = index <= 0;
                nextMatchBtn.disabled = index >= currentMatches.length - 1;
                
                // Update position text
                matchPosition.textContent = currentMatches.length > 0 ? 
                    `(${index + 1} of ${currentMatches.length})` : '';
                
                // Scroll to the current match
                if (currentMatches.length > 0) {
                    const matchElement = document.getElementById(`match-${index}`);
                    if (matchElement) {
                        matchElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        // Make this match more visible
                        document.querySelectorAll('.highlight').forEach(el => {
                            el.style.backgroundColor = '#FFFF00';
                        });
                        matchElement.style.backgroundColor = '#FFA500';
                    }
                }
            }
            
            function escapeRegExp(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }
            
            function resetApp() {
                cssFiles = [];
                currentFileIndex = -1;
                currentMatches = [];
                currentMatchIndex = -1;
                cssFilesList.innerHTML = '<p class="text-gray-500 italic">No files loaded yet</p>';
                cssContent.innerHTML = '<p class="text-gray-500 italic">Select a CSS file to view its content</p>';
                cssDatabase.innerHTML = '';
                currentFile.textContent = '';
                searchInput.value = '';
                showClassesOnly.checked = false;
                caseSensitive.checked = false;
                cssFilesCount.textContent = '0 files found';
                searchStats.classList.add('hidden');
                setLoading(false, 'Reset complete');
            }
            
            function setLoading(isLoading, statusMsg) {
                if (isLoading) {
                    loadingSpinner.classList.remove('hidden');
                    fetchButton.disabled = true;
                } else {
                    loadingSpinner.classList.add('hidden');
                    fetchButton.disabled = false;
                }
                
                statusText.textContent = statusMsg;
            }
        }
    }
}
