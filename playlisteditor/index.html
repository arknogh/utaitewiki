<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist CRUD Interface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    <style>
        .entry-row:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }
        textarea {
            resize: none;
        }
    </style>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto bg-white shadow-md rounded-lg p-6">
        <h1 class="text-2xl font-bold mb-6 text-center">Playlist Manager</h1>
        
        <!-- Input text box -->
        <div class="mb-6">
            <label for="input-text" class="block text-sm font-medium text-gray-700 mb-2">Input:</label>
            <textarea id="input-text" class="w-full h-32 p-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
            <div class="flex justify-end mt-2">
                <button id="parse-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md">Parse Entry</button>
                <button id="clear-input-btn" class="ml-2 bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-2 px-4 rounded-md">Clear</button>
            </div>
        </div>
        
        <!-- CRUD Controls -->
        <div class="flex mb-4 justify-between items-center">
            <h2 class="text-xl font-semibold">Playlist Entries</h2>
            <div>
                <button id="add-btn" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-md">Add New</button>
                <button id="generate-btn" class="ml-2 bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded-md">Generate Output</button>
            </div>
        </div>
        
        <!-- Filter Controls -->
        <div class="flex mb-4 space-x-2">
            <input type="text" id="search-input" placeholder="Search..." class="p-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <select id="year-filter" class="p-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <option value="">All Years</option>
            </select>
            <button id="reset-filter-btn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-2 px-4 rounded-md">Reset Filters</button>
        </div>
        
        <!-- CRUD Table -->
        <div class="overflow-x-auto mb-6">
            <table class="min-w-full bg-white border border-gray-300 shadow-sm rounded-md">
                <thead>
                    <tr class="bg-gray-100 text-gray-700">
                        <th class="py-3 px-4 text-left border-b">#</th>
                        <th class="py-3 px-4 text-left border-b">Title</th>
                        <th class="py-3 px-4 text-left border-b">YouTube</th>
                        <th class="py-3 px-4 text-left border-b">NND</th>
                        <th class="py-3 px-4 text-left border-b">Date</th>
                        <th class="py-3 px-4 text-left border-b">Additional Info</th>
                        <th class="py-3 px-4 text-center border-b">Actions</th>
                    </tr>
                </thead>
                <tbody id="playlist-table">
                    <!-- Table rows will be inserted here -->
                </tbody>
            </table>
        </div>
        
        <!-- Output text box -->
        <div>
            <label for="output-text" class="block text-sm font-medium text-gray-700 mb-2">Output:</label>
            <textarea id="output-text" class="w-full h-48 p-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" readonly></textarea>
            <div class="flex justify-end mt-2">
                <button id="copy-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md">Copy to Clipboard</button>
                <button id="clear-output-btn" class="ml-2 bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-2 px-4 rounded-md">Clear</button>
            </div>
        </div>
    </div>
    
    <!-- Edit/Add Modal -->
    <div id="entry-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-2xl">
            <h2 id="modal-title" class="text-xl font-bold mb-4">Edit Entry</h2>
            <form id="entry-form">
                <input type="hidden" id="entry-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="entry-number" class="block text-sm font-medium text-gray-700 mb-1">Entry Number:</label>
                        <input type="number" id="entry-number" class="w-full p-2 border border-gray-300 rounded-md" required>
                    </div>
                    <div>
                        <label for="entry-title" class="block text-sm font-medium text-gray-700 mb-1">Title:</label>
                        <input type="text" id="entry-title" class="w-full p-2 border border-gray-300 rounded-md" required>
                    </div>
                    <div>
                        <label for="entry-youtube" class="block text-sm font-medium text-gray-700 mb-1">YouTube ID:</label>
                        <input type="text" id="entry-youtube" class="w-full p-2 border border-gray-300 rounded-md">
                    </div>
                    <div>
                        <label for="entry-nnd" class="block text-sm font-medium text-gray-700 mb-1">NND ID:</label>
                        <input type="text" id="entry-nnd" class="w-full p-2 border border-gray-300 rounded-md">
                    </div>
                    <div>
                        <label for="entry-date" class="block text-sm font-medium text-gray-700 mb-1">Date (YYYY.MM.DD):</label>
                        <input type="text" id="entry-date" class="w-full p-2 border border-gray-300 rounded-md" pattern="\d{4}\.\d{2}\.\d{2}" placeholder="YYYY.MM.DD">
                    </div>
                    <div>
                        <label for="entry-additional" class="block text-sm font-medium text-gray-700 mb-1">Additional Info:</label>
                        <input type="text" id="entry-additional" class="w-full p-2 border border-gray-300 rounded-md">
                    </div>
                </div>
                <div class="flex justify-end space-x-2">
                    <button type="button" id="modal-cancel" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-2 px-4 rounded-md">Cancel</button>
                    <button type="submit" id="modal-save" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Confirm Deletion</h2>
            <p class="mb-6">Are you sure you want to delete this entry? This action cannot be undone.</p>
            <input type="hidden" id="delete-entry-id">
            <div class="flex justify-end space-x-2">
                <button type="button" id="delete-cancel" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-2 px-4 rounded-md">Cancel</button>
                <button type="button" id="delete-confirm" class="bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-md">Delete</button>
            </div>
        </div>
    </div>

            // Parse a single entry from the input
            function parseEntry() {
                const text = inputText.value.trim();
                if (!text) return;
                
                try {
                    const entry = parseEntryLine(text);
                    if (entry) {
                        entry.id = nextId++;
                        playlist.push(entry);
                        renderTable();
                        populateYearFilter();
                        inputText.value = '';
                    }
                } catch (e) {
                    alert(`Error parsing entry: ${e.message}`);
                }
            }
            
            // Parse a single entry line and return an entry object
            function parseEntryLine(line) {
                if (!line.startsWith('#')) {
                    throw new Error('Entry must start with #');
                }
                
                // Basic structure
                const entry = {
                    number: 0,
                    title: '',
                    youtube: '',
                    nnd: '',
                    date: '',
                    additional: ''
                };
                
                // Extract number
                const numberMatch = line.match(/^#\s*(\d+)?/);
                if (numberMatch && numberMatch[1]) {
                    entry.number = parseInt(numberMatch[1]);
                } else {
                    // Extract the number from the position in the list
                    entry.number = line.startsWith('# ') ? 1 : 0;
                }
                
                // Remove the number part
                let content = line.replace(/^#\s*(\d+)?\s*/, '').trim();
                
                // Extract title
                let titleMatch;
                if (content.startsWith('"') && (titleMatch = content.match(/^"([^"]+)"/))) {
                    entry.title = titleMatch[1];
                    content = content.substring(titleMatch[0].length).trim();
                } else if (content.startsWith('[') && (titleMatch = content.match(/^\[([^\]]+)\s+([^\]]+)\]/))) {
                    // Handle link format [https://youtu.be/ygKLcVPYpcY Jigsaw Puzzle]
                    const linkParts = titleMatch[1].split(' ');
                    const url = linkParts[0];
                    entry.title = titleMatch[2];
                    
                    // Extract YouTube ID from URL
                    const ytIdMatch = url.match(/youtu\.be\/([^?&]+)|youtube\.com\/watch\?v=([^&]+)/);
                    if (ytIdMatch) {
                        entry.youtube = ytIdMatch[1] || ytIdMatch[2];
                    }
                    
                    content = content.substring(titleMatch[0].length).trim();
                }
                
                // Extract YouTube ID
                const ytMatch = content.match(/{{yt\|([^}]+)}}/);
                if (ytMatch) {
                    entry.youtube = ytMatch[1];
                    content = content.replace(ytMatch[0], '').trim();
                }
                
                // Extract NND ID
                const nndMatch = content.match(/{{nnd\|([^}]+)}}/);
                if (nndMatch) {
                    entry.nnd = nndMatch[1];
                    content = content.replace(nndMatch[0], '').trim();
                }
                
                // Extract date (YYYY.MM.DD)
                const dateMatch = content.match(/\((\d{4}\.\d{2}\.\d{2})\)/);
                if (dateMatch) {
                    entry.date = dateMatch[1];
                    content = content.replace(dateMatch[0], '').trim();
                }
                
                // Extract date with non-standard format
                if (!entry.date) {
                    const altDateMatch = content.match(/\((\d{4})[.-](\d{1,2})[.-](\d{1,2})\)/);
                    if (altDateMatch) {
                        const year = altDateMatch[1];
                        const month = altDateMatch[2].padStart(2, '0');
                        const day = altDateMatch[3].padStart(2, '0');
                        entry.date = `${year}.${month}.${day}`;
                        content = content.replace(altDateMatch[0], '').trim();
                    }
                }
                
                // Handle additional information - this is everything else except for some common patterns
                content = content.trim();
                
                // Handle feat. artists and similar patterns before the date
                const featMatch = content.match(/feat\.\s+(.+?)\s+\(\d{4}/i);
                if (featMatch) {
                    const featText = featMatch[1];
                    // Remove this part from the date match but keep it for additional info
                    content = content.replace(`feat. ${featText}`, '').trim();
                    entry.additional += `feat. ${featText} `;
                }
                
                // Handle (singers x singers) pattern before the date
                const singersMatch = content.match(/\(([^)]+)\)\s+\(\d{4}/);
                if (singersMatch) {
                    const singersText = singersMatch[1];
                    // Remove this part from the date match but keep it for additional info
                    content = content.replace(`(${singersText})`, '').trim();
                    entry.additional += `(${singersText}) `;
                }
                
                // Handle other information
                if (content) {
                    entry.additional += content;
                }
                
                // Clean up additional info
                entry.additional = entry.additional.trim();
                
                // If entry has minimum required data
                if (entry.title) {
                    return entry;
                }
                
                return null;
            }
            
            // Render the table
            function renderTable() {
                playlistTable.innerHTML = '';
                
                // Get current filter values
                const searchTerm = searchInput.value.toLowerCase();
                const yearValue = yearFilter.value;
                
                // Filter the playlist
                const filteredPlaylist = playlist.filter(entry => {
                    // Apply year filter
                    if (yearValue && !entry.date.startsWith(yearValue)) {
                        return false;
                    }
                    
                    // Apply search filter
                    if (searchTerm) {
                        return (
                            entry.title.toLowerCase().includes(searchTerm) ||
                            entry.additional.toLowerCase().includes(searchTerm) ||
                            entry.youtube.toLowerCase().includes(searchTerm) ||
                            entry.nnd.toLowerCase().includes(searchTerm) ||
                            entry.date.includes(searchTerm)
                        );
                    }
                    
                    return true;
                });
                
                // Sort by number
                filteredPlaylist.sort((a, b) => a.number - b.number);
                
                // Create table rows
                filteredPlaylist.forEach(entry => {
                    const row = document.createElement('tr');
                    row.className = 'entry-row';
                    row.dataset.id = entry.id;
                    
                    row.innerHTML = `
                        <td class="py-3 px-4 border-b">${entry.number}</td>
                        <td class="py-3 px-4 border-b">${entry.title}</td>
                        <td class="py-3 px-4 border-b">
                            ${entry.youtube ? `<a href="https://youtu.be/${entry.youtube}" target="_blank" class="text-blue-600 hover:text-blue-800">${entry.youtube}</a>` : ''}
                        </td>
                        <td class="py-3 px-4 border-b">
                            ${entry.nnd ? `<span class="text-gray-700">${entry.nnd}</span>` : ''}
                        </td>
                        <td class="py-3 px-4 border-b">${entry.date}</td>
                        <td class="py-3 px-4 border-b">${entry.additional}</td>
                        <td class="py-3 px-4 border-b text-center">
                            <button data-id="${entry.id}" class="edit-btn text-blue-600 hover:text-blue-800 mr-2">Edit</button>
                            <button data-id="${entry.id}" class="delete-btn text-red-600 hover:text-red-800">Delete</button>
                        </td>
                    `;
                    
                    playlistTable.appendChild(row);
                });
                
                // Add event listeners to buttons
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.dataset.id);
                        openEditModal(id);
                    });
                });
                
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.dataset.id);
                        openDeleteModal(id);
                    });
                });
            }
            
            // Open add modal
            function openAddModal() {
                modalTitle.textContent = 'Add New Entry';
                entryId.value = '';
                
                // Set next available number
                const nextNumber = playlist.length > 0 
                    ? Math.max(...playlist.map(entry => entry.number)) + 1 
                    : 1;
                
                entryNumber.value = nextNumber;
                entryTitle.value = '';
                entryYoutube.value = '';
                entryNnd.value = '';
                entryDate.value = '';
                entryAdditional.value = '';
                
                entryModal.classList.remove('hidden');
            }
            
            // Open edit modal
            function openEditModal(id) {
                const entry = playlist.find(e => e.id === id);
                if (!entry) return;
                
                modalTitle.textContent = 'Edit Entry';
                entryId.value = entry.id;
                entryNumber.value = entry.number;
                entryTitle.value = entry.title;
                entryYoutube.value = entry.youtube;
                entryNnd.value = entry.nnd;
                entryDate.value = entry.date;
                entryAdditional.value = entry.additional;
                
                entryModal.classList.remove('hidden');
            }
            
            // Close modal
            function closeModal() {
                entryModal.classList.add('hidden');
            }
            
            // Save entry
            function saveEntry(e) {
                e.preventDefault();
                
                const id = entryId.value ? parseInt(entryId.value) : null;
                const entry = {
                    number: parseInt(entryNumber.value) || 0,
                    title: entryTitle.value,
                    youtube: entryYoutube.value,
                    nnd: entryNnd.value,
                    date: entryDate.value,
                    additional: entryAdditional.value
                };
                
                if (!entry.title) {
                    alert('Title is required');
                    return;
                }
                
                if (id) {
                    // Edit existing entry
                    const index = playlist.findIndex(e => e.id === id);
                    if (index !== -1) {
                        entry.id = id;
                        playlist[index] = entry;
                    }
                } else {
                    // Add new entry
                    entry.id = nextId++;
                    playlist.push(entry);
                }
                
                closeModal();
                renderTable();
                populateYearFilter();
            }
            
            // Open delete modal
            function openDeleteModal(id) {
                deleteEntryId.value = id;
                deleteModal.classList.remove('hidden');
            }
            
            // Close delete modal
            function closeDeleteModal() {
                deleteModal.classList.add('hidden');
            }
            
            // Confirm delete
            function confirmDelete() {
                const id = parseInt(deleteEntryId.value);
                const index = playlist.findIndex(e => e.id === id);
                
                if (index !== -1) {
                    playlist.splice(index, 1);
                    renderTable();
                    populateYearFilter();
                }
                
                closeDeleteModal();
            }
            
            // Generate output
            function generateOutput() {
                // Sort by number
                const sortedPlaylist = [...playlist].sort((a, b) => a.number - b.number);
                
                // Generate output text
                let output = '{{Playlist|content = \n';
                
                sortedPlaylist.forEach(entry => {
                    let line = `# "${entry.title}"`;
                    
                    // Add YouTube
                    if (entry.youtube) {
                        line += ` {{yt|${entry.youtube}}}`;
                    }
                    
                    // Add NND
                    if (entry.nnd) {
                        line += ` {{nnd|${entry.nnd}}}`;
                    }
                    
                    // Add additional info before date if it doesn't have parentheses
                    if (entry.additional && !entry.additional.includes('(') && !entry.additional.includes(')')) {
                        line += ` ${entry.additional}`;
                    }
                    
                    // Add date
                    if (entry.date) {
                        line += ` (${entry.date})`;
                    }
                    
                    // Add additional info after date if it has parentheses
                    if (entry.additional && (entry.additional.includes('(') || entry.additional.includes(')'))) {
                        line += ` ${entry.additional}`;
                    }
                    
                    output += line + '\n';
                });
                
                output += '}}';
                outputText.value = output;
            }
            
            // Copy to clipboard
            function copyToClipboard() {
                outputText.select();
                document.execCommand('copy');
                
                // Show feedback
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                copyBtn.disabled = true;
                
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.disabled = false;
                }, 2000);
            }
            
            // Populate year filter
            function populateYearFilter() {
                const years = new Set();
                
                playlist.forEach(entry => {
                    if (entry.date) {
                        const year = entry.date.split('.')[0];
                        if (year) {
                            years.add(year);
                        }
                    }
                });
                
                // Clear existing options except the first one
                while (yearFilter.options.length > 1) {
                    yearFilter.options.remove(1);
                }
                
                // Add new options
                Array.from(years).sort().forEach(year => {
                    const option = document.createElement('option');
                    option.value = year;
                    option.textContent = year;
                    yearFilter.appendChild(option);
                });
            }
            
            // Filter entries
            function filterEntries() {
                renderTable();
            }
            
            // Reset filters
            function resetFilters() {
                searchInput.value = '';
                yearFilter.selectedIndex = 0;
                renderTable();
            }
        });
    </script>
</body>
</html>
