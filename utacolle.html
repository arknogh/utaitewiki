<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utacolle JSON to MediaWiki Converter</title>
  <!-- Modern CDN for Tailwind CSS 3.4 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
              950: '#082f49',
            },
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn {
        @apply px-4 py-2 font-semibold rounded-md transition duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2;
      }
      .btn-primary {
        @apply bg-primary-600 text-white hover:bg-primary-700 focus:ring-primary-500;
      }
      .btn-danger {
        @apply bg-red-600 text-white hover:bg-red-700 focus:ring-red-500;
      }
      .btn-success {
        @apply bg-green-600 text-white hover:bg-green-700 focus:ring-green-500;
      }
      .btn-secondary {
        @apply bg-gray-500 text-white hover:bg-gray-600 focus:ring-gray-400;
      }
      .btn-warning {
        @apply bg-yellow-500 text-white hover:bg-yellow-600 focus:ring-yellow-400;
      }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-4">
  <div class="max-w-7xl mx-auto">
    <header class="mb-8">
      <h1 class="text-4xl font-bold text-center text-gray-800">Utacolle JSON to MediaWiki Converter</h1>
      <p class="text-center text-gray-600 mt-2">Convert your Utacolle JSON data to MediaWiki format</p>
    </header>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
      <!-- JSON Input Panel -->
      <div class="bg-white rounded-xl shadow-md p-6 transition duration-300 ease-in-out">
        <h2 class="text-xl font-bold mb-4 flex items-center text-gray-800">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
          JSON Input
        </h2>
        <div class="flex gap-3 mb-4">
          <button id="loadSampleBtn" class="btn btn-primary flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
            Load Sample
          </button>
          <button id="clearDataBtn" class="btn btn-danger flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            Clear
          </button>
        </div>
        <textarea id="jsonInput" class="w-full h-[350px] border border-gray-200 rounded-lg p-3 mb-3 font-mono text-sm focus:border-primary-500 focus:ring focus:ring-primary-200 focus:ring-opacity-50" placeholder="Paste JSON data here..."></textarea>
        <button id="parseJsonBtn" class="btn btn-success flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
          </svg>
          Parse JSON
        </button>
      </div>
      
      <!-- MediaWiki Output Panel -->
      <div class="bg-white rounded-xl shadow-md p-6 transition duration-300 ease-in-out">
        <h2 class="text-xl font-bold mb-4 flex items-center text-gray-800">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          MediaWiki Output
        </h2>
        <div class="relative mb-3">
          <textarea id="wikiOutput" class="w-full h-[400px] border border-gray-200 rounded-lg p-3 font-mono text-sm focus:border-primary-500 focus:ring focus:ring-primary-200 focus:ring-opacity-50" readonly></textarea>
          <button id="copyBtn" class="absolute top-2 right-2 bg-gray-100 hover:bg-gray-200 py-1 px-3 rounded text-sm transition flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
            </svg>
            Copy
          </button>
        </div>
        <button id="generateWikiCodeBtn" class="btn btn-primary flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
          Generate MediaWiki Code
        </button>
      </div>
    </div>
    
    <!-- CRUD Table Panel -->
    <div class="bg-white rounded-xl shadow-md p-6 mb-6 transition duration-300 ease-in-out">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold flex items-center text-gray-800">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
          CRUD Table
        </h2>
        <button id="addRowBtn" class="btn btn-success flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
          </svg>
          Add Entry
        </button>
      </div>
      <div class="overflow-x-auto rounded-lg border border-gray-200 mb-4">
        <table id="crudTable" class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ranking</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Song Title</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Utaite Name</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Wiki Page (Optional)</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Video ID</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
            <!-- Data rows will be inserted here -->
            <tr class="no-data-message">
              <td colspan="6" class="px-6 py-4 text-center text-gray-500">No data available. Use the Parse JSON button to load data.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="modal" class="fixed inset-0 bg-black/50 hidden backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-xl p-6 max-w-lg w-full">
      <h3 class="text-lg font-bold mb-4 flex items-center" id="modalTitle">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
        <span>Edit Entry</span>
      </h3>
      <form id="entryForm" class="space-y-4">
        <input type="hidden" id="editIndex">
        <div>
          <label for="rankingInput" class="block mb-1 text-sm font-medium text-gray-700">Ranking</label>
          <input type="number" id="rankingInput" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" required>
        </div>
        <div>
          <label for="songTitleInput" class="block mb-1 text-sm font-medium text-gray-700">Song Title</label>
          <input type="text" id="songTitleInput" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" required>
        </div>
        <div>
          <label for="utaiteNameInput" class="block mb-1 text-sm font-medium text-gray-700">Utaite Name</label>
          <input type="text" id="utaiteNameInput" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" required>
        </div>
        <div>
          <label for="utaiteWikiInput" class="block mb-1 text-sm font-medium text-gray-700">Utaite Wiki Page (Optional)</label>
          <input type="text" id="utaiteWikiInput" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
        </div>
        <div>
          <label for="videoIdInput" class="block mb-1 text-sm font-medium text-gray-700">Video ID</label>
          <input type="text" id="videoIdInput" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" required>
        </div>
        <div class="flex justify-end space-x-3 pt-2">
          <button type="button" id="cancelModalBtn" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="saveEntryBtn" class="btn btn-primary">Save Entry</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-4 right-4 transform translate-y-10 opacity-0 transition-all duration-300 bg-green-500 text-white p-3 rounded-lg shadow-lg max-w-xs flex items-center">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
    </svg>
    <span id="toastMessage">Operation successful!</span>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      let songData = [];
      const modal = document.getElementById('modal');
      const entryForm = document.getElementById('entryForm');
      const toast = document.getElementById('toast');

      // Show toast notification
      function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        
        // Set message and color
        toastMessage.textContent = message;
        if (type === 'success') {
          toast.classList.remove('bg-red-500');
          toast.classList.add('bg-green-500');
        } else {
          toast.classList.remove('bg-green-500');
          toast.classList.add('bg-red-500');
        }
        
        // Show toast
        toast.classList.remove('translate-y-10', 'opacity-0');
        toast.classList.add('translate-y-0', 'opacity-100');
        
        // Hide toast after 3 seconds
        setTimeout(() => {
          toast.classList.remove('translate-y-0', 'opacity-100');
          toast.classList.add('translate-y-10', 'opacity-0');
        }, 3000);
      }

      // Extract utaite name from the format [[name]] or [[wiki|name]]
      function extractUtaiteName(utaite) {
        const match = utaite.match(/\[\[(.*?)\]\]/);
        if (!match) return { name: utaite, wikiPage: '' };
        
        const content = match[1];
        if (content.includes('|')) {
          const [wikiPage, name] = content.split('|');
          return { name, wikiPage };
        } else {
          return { name: content, wikiPage: '' };
        }
      }

      // Load sample data
      document.getElementById('loadSampleBtn').addEventListener('click', function() {
        fetch('/utacolle2024falltop100.json')
          .then(response => {
            if (!response.ok) {
              throw new Error('Could not load the sample data. Using hardcoded sample instead.');
            }
            return response.json();
          })
          .catch(error => {
            console.error(error);
            // Use first 5 entries from provided data as sample
            return [
              {
                "ranking": 1,
                "song_title": "Butter-Fly -thanks.ver- 歌ってみた",
                "utaite": "[[つきみぐー、]]",
                "video_id": "sm44324666"
              },
              {
                "ranking": 2,
                "song_title": "アンノウン・マザーグース / wowaka",
                "utaite": "[[結城碧]]",
                "video_id": "sm44350006"
              },
              {
                "ranking": 3,
                "song_title": "オトノケ／Creepy Nuts",
                "utaite": "[[＿＿（アンダーバー）]]",
                "video_id": "sm44353979"
              },
              {
                "ranking": 4,
                "song_title": "愛して愛して愛して / きくお - 吉沢ぽわ",
                "utaite": "[[吉沢ぽわ]]",
                "video_id": "sm44350527"
              },
              {
                "ranking": 5,
                "song_title": "今日もどこかでデビルマン歌ってみた / 湯毛",
                "utaite": "[[湯毛]]",
                "video_id": "sm44346709"
              }
            ];
          })
          .then(data => {
            document.getElementById('jsonInput').value = JSON.stringify(data, null, 2);
            showToast('Sample data loaded successfully');
          });
      });

      // Clear data
      document.getElementById('clearDataBtn').addEventListener('click', function() {
        document.getElementById('jsonInput').value = '';
        songData = [];
        updateTable();
        document.getElementById('wikiOutput').value = '';
        showToast('Data cleared successfully');
      });

      // Parse JSON
      document.getElementById('parseJsonBtn').addEventListener('click', function() {
        try {
          const jsonText = document.getElementById('jsonInput').value.trim();
          if (!jsonText) {
            showToast('Please enter JSON data', 'error');
            return;
          }
          
          const parsedData = JSON.parse(jsonText);
          if (!Array.isArray(parsedData)) {
            showToast('Invalid data format. Expected an array.', 'error');
            return;
          }
          
          songData = parsedData.map(item => {
            const { name, wikiPage } = extractUtaiteName(item.utaite);
            return {
              ranking: item.ranking,
              songTitle: item.song_title,
              utaiteName: name,
              utaiteWiki: wikiPage,
              videoId: item.video_id
            };
          });
          
          updateTable();
          showToast('JSON parsed successfully');
        } catch (error) {
          console.error(error);
          showToast('Failed to parse JSON: ' + error.message, 'error');
        }
      });

      // Update table
      function updateTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        
        if (songData.length === 0) {
          const tr = document.createElement('tr');
          tr.className = 'no-data-message';
          tr.innerHTML = `<td colspan="6" class="px-6 py-4 text-center text-gray-500">No data available. Use the Parse JSON button to load data.</td>`;
          tableBody.appendChild(tr);
          return;
        }
        
        songData.forEach((item, index) => {
          const tr = document.createElement('tr');
          tr.className = index % 2 === 0 ? 'bg-white' : 'bg-gray-50';
          tr.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${item.ranking}</td>
            <td class="px-6 py-4 text-sm text-gray-900">${item.songTitle}</td>
            <td class="px-6 py-4 text-sm text-gray-900">${item.utaiteName}</td>
            <td class="px-6 py-4 text-sm text-gray-900">${item.utaiteWiki || '—'}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-gray-900">${item.videoId}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
              <button class="edit-btn text-primary-600 hover:text-primary-800 mr-3" data-index="${index}">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                </svg>
              </button>
              <button class="delete-btn text-red-600 hover:text-red-800" data-index="${index}">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
              </button>
            </td>
          `;
          tableBody.appendChild(tr);
        });
        
        // Add edit and delete event listeners
        document.querySelectorAll('.edit-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const index = parseInt(this.getAttribute('data-index'));
            openEditModal(index);
          });
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const index = parseInt(this.getAttribute('data-index'));
            deleteEntry(index);
          });
        });
      }

      // Open modal for adding/editing
      function openEditModal(index = -1) {
        const modalTitle = document.getElementById('modalTitle').querySelector('span');
        modalTitle.textContent = index === -1 ? 'Add New Entry' : 'Edit Entry';
        
        document.getElementById('editIndex').value = index;
        
        if (index !== -1) {
          const entry = songData[index];
          document.getElementById('rankingInput').value = entry.ranking;
          document.getElementById('songTitleInput').value = entry.songTitle;
          document.getElementById('utaiteNameInput').value = entry.utaiteName;
          document.getElementById('utaiteWikiInput').value = entry.utaiteWiki || '';
          document.getElementById('videoIdInput').value = entry.videoId;
        } else {
          entryForm.reset();
          if (songData.length > 0) {
            const nextRanking = Math.max(...songData.map(item => item.ranking)) + 1;
            document.getElementById('rankingInput').value = nextRanking;
          } else {
            document.getElementById('rankingInput').value = 1;
          }
        }
        
        modal.classList.remove('hidden');
      }

      // Add new entry
      document.getElementById('addRowBtn').addEventListener('click', function() {
        openEditModal();
      });

      // Close modal
      document.getElementById('cancelModalBtn').addEventListener('click', function() {
        modal.classList.add('hidden');
      });

      // Save entry
      entryForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const index = parseInt(document.getElementById('editIndex').value);
        const ranking = parseInt(document.getElementById('rankingInput').value);
        const songTitle = document.getElementById('songTitleInput').value;
        const utaiteName = document.getElementById('utaiteNameInput').value;
        const utaiteWiki = document.getElementById('utaiteWikiInput').value;
        const videoId = document.getElementById('videoIdInput').value;
        
        const entry = {
          ranking,
          songTitle,
          utaiteName,
          utaiteWiki,
          videoId
        };
        
        if (index === -1) {
          // Add new entry
          songData.push(entry);
          showToast('Entry added successfully');
        } else {
          // Update existing entry
          songData[index] = entry;
          showToast('Entry updated successfully');
        }
        
        // Sort data by ranking
        songData.sort((a, b) => a.ranking - b.ranking);
        
        updateTable();
        modal.classList.add('hidden');
      });

      // Delete entry
      function deleteEntry(index) {
        if (confirm('Are you sure you want to delete this entry?')) {
          songData.splice(index, 1);
          updateTable();
          showToast('Entry deleted successfully');
        }
      }

      // Generate MediaWiki code
      // Continue from the previous HTML file
document.getElementById('generateWikiCodeBtn').addEventListener('click', function() {
  if (songData.length === 0) {
    showToast('No data to generate MediaWiki code', 'error');
    return;
  }
  
  let wikiCode = '{| class="wikitable datatable" data-page-length="100" data-order=\'[[0, "asc"]]\'\n';
  wikiCode += '! 順位\n! 動画タイトル\n! 投稿者\n! 動画リンク\n|-\n';
  
  songData.forEach(entry => {
    let utaiteMarkup = '';
    if (entry.utaiteWiki && entry.utaiteWiki !== entry.utaiteName) {
      // Has wiki page and it's different from the name
      utaiteMarkup = `[[${entry.utaiteWiki}|${entry.utaiteName}]]`;
    } else {
      // No wiki page or wiki page is the same as name
      utaiteMarkup = `[[${entry.utaiteName}]]`;
    }
    
    wikiCode += `{{FUCE|${entry.ranking}|${entry.songTitle}|${utaiteMarkup} |${entry.videoId}}}\n`;
  });
  
  wikiCode += '|}';
  
  document.getElementById('wikiOutput').value = wikiCode;
  showToast('MediaWiki code generated successfully');
});

// Copy button functionality
document.getElementById('copyBtn').addEventListener('click', function() {
  const wikiOutput = document.getElementById('wikiOutput');
  wikiOutput.select();
  wikiOutput.setSelectionRange(0, 99999); // For mobile devices
  
  try {
    navigator.clipboard.writeText(wikiOutput.value)
      .then(() => {
        showToast('Copied to clipboard!');
      })
      .catch(err => {
        console.error('Could not copy text: ', err);
        // Fallback for older browsers
        document.execCommand('copy');
        showToast('Copied to clipboard!');
      });
  } catch (err) {
    console.error('Copy failed: ', err);
    showToast('Failed to copy to clipboard', 'error');
  }
});

// Click outside modal to close
window.addEventListener('click', function(event) {
  if (event.target === modal) {
    modal.classList.add('hidden');
  }
});

updateTable();
